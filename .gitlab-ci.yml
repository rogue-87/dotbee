stages:
  - build
  - release

variables:
  BINARY_NAME: dotbee

workflow:
  rules:
    - if: $CI_COMMIT_TAG

.cross_compile_setup:
  before_script:
    - apt-get update
    - apt-get install -y musl-tools gcc-aarch64-linux-gnu
    - rustup target add "$TARGET"

.build_template:
  stage: build
  image: rust:1.95.0
  extends:
    - .cross_compile_setup
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - cargo build --release --target $TARGET

    # archive packaging
    - PKG_NAME="${BINARY_NAME}-${CI_COMMIT_TAG}-${PLATFORM}"
    - BIN_FILE="target/$TARGET/release/${BINARY_NAME}"
    - tar -czf ${PKG_NAME}.tar.gz -C "$(dirname "${BIN_FILE}")" "${BINARY_NAME}"

    # .deb packaging
    - cargo install cargo-deb
    - cargo deb --target $TARGET
    - mv target/$TARGET/debian/*.deb ${BINARY_NAME}-${CI_COMMIT_TAG}-${PKG_ARCH_DEB}.deb

    # .rpm packaging
    - cargo install cargo-generate-rpm
    - cargo generate-rpm --target $TARGET
    - mv target/$TARGET/generate-rpm/*.rpm ${BINARY_NAME}-${CI_COMMIT_TAG}-${PKG_ARCH_RPM}.rpm
  artifacts:
    paths:
      - ${BINARY_NAME}-*.tar.gz
      - ${BINARY_NAME}-*.deb
      - ${BINARY_NAME}-*.rpm

build:x86_64:
  extends: .build_template
  variables:
    TARGET: x86_64-unknown-linux-musl
    PLATFORM: linux-x64-musl
    PKG_ARCH_DEB: amd64
    PKG_ARCH_RPM: x86_64

build:aarch64:
  extends: .build_template
  variables:
    CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
    PKG_ARCH_DEB: arm64
    PKG_ARCH_RPM: aarch64
    PLATFORM: linux-arm64-musl
    TARGET: aarch64-unknown-linux-musl

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build:x86_64
      artifacts: true
    - job: build:aarch64
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Creating GitLab release for $BINARY_NAME $CI_COMMIT_TAG"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "$BINARY_NAME $CI_COMMIT_TAG"
    description: |
      ## $BINARY_NAME $CI_COMMIT_TAG

      ### Binaries
      - Linux Musl x64
      - Linux Musl aarch64
      - RPM x64
      - RPM aarch64
      - DEB x64
      - DEB aarch64
    assets:
      links:
        # x86_64
        - name: "dotbee-${CI_COMMIT_TAG}-linux-x64-musl.tar.gz"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/dotbee-${CI_COMMIT_TAG}-linux-x64-musl.tar.gz?job=build:x86_64"
          filepath: "/dotbee-${CI_COMMIT_TAG}-linux-x64-musl.tar.gz"

        - name: "dotbee-${CI_COMMIT_TAG}-amd64.deb"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/dotbee-${CI_COMMIT_TAG}-amd64.deb?job=build:x86_64"
          filepath: "/dotbee-${CI_COMMIT_TAG}-amd64.deb"

        - name: "dotbee-${CI_COMMIT_TAG}-x86_64.rpm"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/dotbee-${CI_COMMIT_TAG}-x86_64.rpm?job=build:x86_64"
          filepath: "/dotbee-${CI_COMMIT_TAG}-x86_64.rpm"

          # aarch64
        - name: "dotbee-${CI_COMMIT_TAG}-linux-arm64-musl.tar.gz"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/dotbee-${CI_COMMIT_TAG}-linux-arm64-musl.tar.gz?job=build:aarch64"
          filepath: "/dotbee-${CI_COMMIT_TAG}-linux-arm64-musl.tar.gz"

        - name: "dotbee-${CI_COMMIT_TAG}-arm64.deb"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/dotbee-${CI_COMMIT_TAG}-arm64.deb?job=build:aarch64"
          filepath: "/dotbee-${CI_COMMIT_TAG}-arm64.deb"

        - name: "dotbee-${CI_COMMIT_TAG}-aarch64.rpm"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/dotbee-${CI_COMMIT_TAG}-aarch64.rpm?job=build:aarch64"
          filepath: "/dotbee-${CI_COMMIT_TAG}-aarch64.rpm"
