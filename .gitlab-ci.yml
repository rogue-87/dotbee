stages:
  - build

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo

build-release:
  stage: build
  image: rust:1.92.0
  cache:
    paths:
      - .cargo/bin/
      - .cargo/registry/index/
      - .cargo/registry/cache/
      - .cargo/git/db/
      - target/
  script:
    - cargo build --release
  artifacts:
    paths:
      - target/release/dotsy
  rules:
    - if: $CI_COMMIT_TAG
