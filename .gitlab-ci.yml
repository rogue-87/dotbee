stages:
  - build
  - package
  - release

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  BINARY_NAME: dotbee
  # the host where the docker instance is running
  DOCKER_HOST: tcp://docker:2375
  # ensure cross knows it's running remotely
  CROSS_REMOTE: 1

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

.cargo_cache:
  cache:
    key: "${CI_JOB_NAME}-${TARGET}"
    paths:
      - .cargo/bin/
      - .cargo/registry/index/
      - .cargo/registry/cache/
      - .cargo/git/db/
      - target/

.cross_setup:
  before_script:
    - export PATH="$CARGO_HOME/bin:$PATH"
    - apt-get update && apt-get install -y --no-install-recommends docker.io
    - hash cross 2>/dev/null || cargo install cross

build:
  stage: build
  image: rust:1.95.0
  services:
    - docker:20.10.12-dind
  extends:
    - .cargo_cache
    - .cross_setup
  rules:
    - if: $CI_COMMIT_TAG
  parallel:
    matrix:
      - TARGET: x86_64-unknown-linux-musl
        PLATFORM: linux-x64-musl
      - TARGET: aarch64-unknown-linux-musl
        PLATFORM: linux-arm64-musl
  script:
    - cross build --release --target $TARGET
    - PKG_NAME="${BINARY_NAME}-${CI_COMMIT_TAG}-${PLATFORM}"
    - BIN_FILE="target/$TARGET/release/${BINARY_NAME}"
    - tar -czf ${PKG_NAME}.tar.gz -C "$(dirname "${BIN_FILE}")" "${BINARY_NAME}"
  artifacts:
    paths:
      - ${BINARY_NAME}-*.tar.gz

pkg-deb:
  stage: package
  image: rust:1.95.0
  services:
    - docker:20.10.12-dind
  extends:
    - .cargo_cache
    - .cross_setup
  rules:
    - if: $CI_COMMIT_TAG
  parallel:
    matrix:
      - TARGET: x86_64-unknown-linux-musl
        PKG_ARCH: amd64
      - TARGET: aarch64-unknown-linux-musl
        PKG_ARCH: arm64
  script:
    - cargo install cargo-deb
    - cargo deb --target $TARGET
    - mv target/$TARGET/debian/*.deb ${BINARY_NAME}_${CI_COMMIT_TAG}_${PKG_ARCH}.deb
  artifacts:
    paths:
      - ${BINARY_NAME}_*.deb

pkg-rpm:
  stage: package
  image: rust:1.95.0
  services:
    - docker:20.10.12-dind
  extends:
    - .cargo_cache
    - .cross_setup
  rules:
    - if: $CI_COMMIT_TAG
  parallel:
    matrix:
      - TARGET: x86_64-unknown-linux-musl
        PKG_ARCH: x86_64
      - TARGET: aarch64-unknown-linux-musl
        PKG_ARCH: aarch64
  script:
    - cargo install cargo-generate-rpm
    - cargo generate-rpm --target $TARGET
    - mv target/$TARGET/generate-rpm/*.rpm ${BINARY_NAME}_${CI_COMMIT_TAG}_${PKG_ARCH}.rpm
  artifacts:
    paths:
      - ${BINARY_NAME}_*.rpm

upload:
  stage: release
  image: curlimages/curl:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - job: build
    - job: pkg-deb
    - job: pkg-rpm
  script:
    - |
      for FILE in ${BINARY_NAME}-*.tar.gz ${BINARY_NAME}_*.deb ${BINARY_NAME}_*.rpm; do
        if [ ! -f "$FILE" ]; then
          echo "Skipping (no file found for pattern)"
          continue
        fi
        echo "Uploading $FILE to Generic Package Registry..."
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "$FILE" \
             "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/${CI_COMMIT_TAG}/${FILE}"
      done

release:
  stage: release
  image:
    name: registry.gitlab.com/gitlab-org/release-cli:latest
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - job: build
    - job: upload
    - job: pkg-deb
    - job: pkg-rpm
  before_script:
    - apk add --no-cache jq
  script:
    - |
      echo "Generating asset links from local artifacts..."
      ASSETS_FLAGS=""
      for FILE in ${BINARY_NAME}-*.tar.gz ${BINARY_NAME}_*.deb ${BINARY_NAME}_*.rpm; do
          if [ -f "$FILE" ]; then
              URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/${CI_COMMIT_TAG}/${FILE}"
              LINK_JSON=$(jq -cn --arg name "$FILE" --arg url "$URL" '{name: $name, url: $url}')
              ASSETS_FLAGS="${ASSETS_FLAGS} --assets-link ${LINK_JSON}"
          fi
      done

      if [ -z "$ASSETS_FLAGS" ]; then
        echo "No local artifacts found. Skipping release creation."
        exit 0
      fi

      echo "Creating GitLab Release..."
      release-cli create --name "Release $CI_COMMIT_TAG" --tag-name $CI_COMMIT_TAG \
        --description "Release of version $CI_COMMIT_TAG." \
        ${ASSETS_FLAGS}
