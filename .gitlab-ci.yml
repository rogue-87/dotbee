stages:
  - build
  - release

variables:
  BINARY_NAME: dotbee

workflow:
  rules:
    - if: $CI_COMMIT_TAG

.cross_compile_setup:
  before_script:
    - apt-get update
    - apt-get install -y musl-tools gcc-aarch64-linux-gnu
    - rustup target add "$TARGET"

build:
  stage: build
  image: rust:1.95.0
  extends:
    - .cross_compile_setup
  rules:
    - if: $CI_COMMIT_TAG
  parallel:
    matrix:
      - TARGET: x86_64-unknown-linux-musl
        PLATFORM: linux-x64-musl
        PKG_ARCH_DEB: amd64
        PKG_ARCH_RPM: x86_64
      - TARGET: aarch64-unknown-linux-musl
        PLATFORM: linux-arm64-musl
        PKG_ARCH_DEB: arm64
        PKG_ARCH_RPM: aarch64
  script:
    # build
    - cargo build --release --target $TARGET

    # archive packaging
    - PKG_NAME="${BINARY_NAME}-${CI_COMMIT_TAG}-${PLATFORM}"
    - BIN_FILE="target/$TARGET/release/${BINARY_NAME}"
    - tar -czf ${PKG_NAME}.tar.gz -C "$(dirname "${BIN_FILE}")" "${BINARY_NAME}"

    # .deb packaging
    - cargo install cargo-deb
    - cargo deb --target $TARGET
    - mv target/$TARGET/debian/*.deb ${BINARY_NAME}-${CI_COMMIT_TAG}-${PKG_ARCH_DEB}.deb

    # .rpm packaging
    - cargo install cargo-generate-rpm
    - cargo generate-rpm --target $TARGET
    - mv target/$TARGET/generate-rpm/*.rpm ${BINARY_NAME}-${CI_COMMIT_TAG}-${PKG_ARCH_RPM}.rpm

  artifacts:
    paths:
      - ${BINARY_NAME}-*.tar.gz
      - ${BINARY_NAME}_*.deb
      - ${BINARY_NAME}_*.rpm

upload:
  stage: release
  image: curlimages/curl:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - job: build
  script:
    - |
      for FILE in ${BINARY_NAME}-*.tar.gz ${BINARY_NAME}_*.deb ${BINARY_NAME}_*.rpm; do
        if [ ! -f "$FILE" ]; then
          echo "Skipping (no file found for pattern)"
          continue
        fi
        echo "Uploading $FILE to Generic Package Registry..."
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "$FILE" \
             "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/${CI_COMMIT_TAG}/${FILE}"
      done

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build
      artifacts: true
    - job: upload
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - apk add --no-cache jq
  script:
    - |
      echo "Generating asset links from local artifacts..."
      ASSETS_FLAGS=""
      for FILE in ${BINARY_NAME}-*.tar.gz ${BINARY_NAME}_*.deb ${BINARY_NAME}_*.rpm; do
          if [ -f "$FILE" ]; then
              URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/${CI_COMMIT_TAG}/${FILE}"
              LINK_JSON=$(jq -cn --arg name "$FILE" --arg url "$URL" '{name: $name, url: $url}')
              ASSETS_FLAGS="${ASSETS_FLAGS} --assets-link ${LINK_JSON}"
          fi
      done

      if [ -z "$ASSETS_FLAGS" ]; then
        echo "No local artifacts found. Skipping release creation."
        exit 0
      fi

      echo "Creating GitLab Release..."
      release-cli create --name "Release $CI_COMMIT_TAG" --tag-name $CI_COMMIT_TAG \
        --description "Release of version $CI_COMMIT_TAG." \
        ${ASSETS_FLAGS}
