# Lefthook configuration for dotbee
# Reference: https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  commands:
    # Formatting
    rustfmt:
      glob: "*.rs"
      run: cargo fmt --all

    tombi:
      glob: "*.toml"
      run: tombi format {staged_files}

      # Changelogs
    changelog:
      run: "git-cliff -o CHANGELOG.md"
      glob: "CHANGELOG.md"

    # Linting/Code Checks
    clippy:
      run: cargo clippy --all -- -D warnings

    check:
      run: cargo check --all

