# .gitlab-ci/release.yml

upload:
  stage: release
  image: curlimages/curl:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - job: build
  script:
    - |
        for FILE in ${BINARY_NAME}-*.tar.gz; do
          echo "Uploading $FILE to Generic Package Registry..."
          curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}"
               --upload-file "$FILE"
               "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/${CI_COMMIT_TAG}/${FILE}"
        done

release:
  stage: release
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - job: upload
  before_script:
    - apk add --no-cache curl jq
    - curl -sL "https://release-cli-downloads.s3.amazonaws.com/latest/release-cli-linux-amd64" -o /usr/local/bin/release-cli
    - chmod +x /usr/local/bin/release-cli
  script:
    - |
        echo "Fetching package list for tag $CI_COMMIT_TAG..."
        # Query the GitLab API for packages of this name and version (tag).
        # We extract the JSON array of package files from the first package found.
        PACKAGE_FILES_JSON=$(curl --header "JOB-TOKEN: $CI_JOB_TOKEN" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages?package_name=${BINARY_NAME}&version=${CI_COMMIT_TAG}" | jq '.[0].package_files')

        if [ -z "$PACKAGE_FILES_JSON" ] || [ "$PACKAGE_FILES_JSON" == "null" ]; then
          echo "No packages found for this tag. Skipping release creation."
          exit 0
        fi

        echo "Generating asset links from API response..."
        ASSETS_FLAGS=""
        # Loop through the JSON array of package files.
        for FILE_NAME in $(echo "$PACKAGE_FILES_JSON" | jq -r '.[].file_name'); do
            # Construct the full URL for the asset.
            URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/${CI_COMMIT_TAG}/${FILE_NAME}"
            # Construct the JSON required by the --assets-link parameter.
            LINK_JSON="{"name":"${FILE_NAME}","url":"${URL}"}"
            ASSETS_FLAGS="${ASSETS_FLAGS} --assets-link '${LINK_JSON}'"
        done

        if [ -z "$ASSETS_FLAGS" ]; then
          echo "Could not generate any asset links. Skipping release creation."
          exit 0
        fi

        echo "Creating GitLab Release..."
        # Note: release-cli is installed and made executable in the .gitlab-ci.yml before_script.
        release-cli create --name "Release $CI_COMMIT_TAG" --tag-name $CI_COMMIT_TAG \
          --description "Release of version $CI_COMMIT_TAG." \
          ${ASSETS_FLAGS}
