# .gitlab-ci/release.yml

upload:
  stage: release
  image: curlimages/curl:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - job: build
  script:
    - |
        for FILE in ${BINARY_NAME}-*.tar.gz; do
          echo "Uploading $FILE to Generic Package Registry..."
          curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
               --upload-file "$FILE" \
               "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/${CI_COMMIT_TAG}/${FILE}"
        done

release:
  stage: release
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - job: build
    - job: upload
  before_script:
    - apk add --no-cache curl jq
    - curl -sL "https://release-cli-downloads.s3.amazonaws.com/latest/release-cli-linux-amd64" -o /usr/local/bin/release-cli
    - chmod +x /usr/local/bin/release-cli
  script:
    - |
        echo "Generating asset links from local artifacts..."
        ASSETS_FLAGS=""
        for FILE in ${BINARY_NAME}-*.tar.gz; do
            if [ -f "$FILE" ]; then
                URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/${CI_COMMIT_TAG}/${FILE}"
                LINK_JSON=$(jq -cn --arg name "$FILE" --arg url "$URL" '{name: $name, url: $url}')
                ASSETS_FLAGS="${ASSETS_FLAGS} --assets-link ${LINK_JSON}"
            fi
        done

        if [ -z "$ASSETS_FLAGS" ]; then
          echo "No local artifacts found. Skipping release creation."
          exit 0
        fi

        echo "Creating GitLab Release..."
        release-cli create --name "Release $CI_COMMIT_TAG" --tag-name $CI_COMMIT_TAG \
          --description "Release of version $CI_COMMIT_TAG." \
          ${ASSETS_FLAGS}
